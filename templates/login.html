{% extends "base.html" %}
{% block title %}Вход{% endblock %}

{% block content %}
<div class="form-center">
  <div class="card">
    <div style="text-align:center; margin-bottom:28px;">
      <div style="width:52px;height:52px;background:var(--logo-bg);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;margin:0 auto 14px;letter-spacing:-0.5px;">ГП</div>
      <div style="font-size:20px;font-weight:700;letter-spacing:-0.3px;">ГИС Портал</div>
      <div style="color:var(--text-muted);font-size:13px;margin-top:6px;">Система технической поддержки</div>
    </div>
    <form method="post">
      <label>Логин</label>
      <input type="text" name="login" autocomplete="username" required>
      <label>Пароль</label>
      <input type="password" name="password" autocomplete="current-password" required>
      <button type="submit" class="btn btn-primary btn-mt" style="width:100%;">Войти в систему</button>
    </form>
  </div>
</div>
{% endblock %}
