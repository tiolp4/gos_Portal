{% extends "base.html" %}
{% block title %}Вход{% endblock %}

{% block content %}
<div class="form-center">
  <div class="card">
    <div style="text-align:center; margin-bottom:24px;">
      <div style="width:48px;height:48px;background:#4a7fc1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;margin:0 auto 12px;">ГП</div>
      <div style="font-size:18px;font-weight:600;">ГИС Портал</div>
      <div style="color:#7b8296;font-size:13px;margin-top:4px;">Система технической поддержки</div>
    </div>
    <form method="post">
      <label>Логин</label>
      <input type="text" name="login" autocomplete="username" required>
      <label>Пароль</label>
      <input type="password" name="password" autocomplete="current-password" required>
      <button type="submit" class="btn btn-primary btn-mt" style="width:100%;">Войти в систему</button>
    </form>
  </div>
</div>
{% endblock %}
