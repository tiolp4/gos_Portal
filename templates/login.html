{% extends "base.html" %}
{% block title %}Вход{% endblock %}

{% block content %}
<div class="card">
  <h1>Вход</h1>

  <form method="post">
    <label>Логин</label>
    <input type="text" name="login" autocomplete="username" required>

    <label>Пароль</label>
    <input type="password" name="password" autocomplete="current-password" required>

    <button type="submit">Войти</button>
  </form>

  <div class="hint">
    Нет аккаунта? <a href="{{ url_for('register') }}">Регистрация</a>
  </div>
</div>
{% endblock %}
