{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}

{% block content %}
<div style="max-width:560px;margin:40px auto 0;">
  <div class="card">
    <div class="card-title">Регистрация учётной записи</div>
    <form method="post">
      <div class="form-row">
        <div>
          <label>Фамилия <span style="color:#c0392b;">*</span></label>
          <input type="text" name="surname" required>
        </div>
        <div>
          <label>Имя <span style="color:#c0392b;">*</span></label>
          <input type="text" name="name" required>
        </div>
        <div>
          <label>Отчество</label>
          <input type="text" name="patronymic">
        </div>
        <div>
          <label>Должность</label>
          <input type="text" name="position">
        </div>
      </div>
      <label>ИНН организации <span style="color:#c0392b;">*</span></label>
      <input type="text" name="inn" placeholder="10 или 12 цифр" required>
      <div class="form-row">
        <div>
          <label>Логин <span style="color:#c0392b;">*</span></label>
          <input type="text" name="login" required>
        </div>
        <div>
          <label>Пароль <span style="color:#c0392b;">*</span></label>
          <input type="password" name="password" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-mt" style="width:100%;">Создать учётную запись</button>
    </form>
    <div style="text-align:center;margin-top:16px;color:#7b8296;font-size:13px;">
      Уже есть учётная запись? <a href="{{ url_for('auth.login') }}">Войти</a>
    </div>
  </div>
</div>
{% endblock %}
